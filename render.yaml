services:
  - type: web
    name: baha-website
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./BAHA-ENERJI-WEBSITE/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: BAHA_URETIM_SESSION_MINUTES
        value: 100
      - key: BAHA_URETIM_COOKIE_SECURE
        value: "true"
      - key: EPIAS_TIMEOUT_SECONDS
        value: 25
      - key: BAHA_URETIM_DATA_CACHE_SECONDS
        value: 300
